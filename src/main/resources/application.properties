# ===== 데이터베이스 연결 =====
# Python 버전과 같은 PostgreSQL을 그대로 사용 (docker로 띄운 fems-db)
spring.datasource.url=jdbc:postgresql://localhost:5432/fems
spring.datasource.username=fems
spring.datasource.password=fems
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# ddl-auto=update : Entity를 보고 테이블이 없으면 자동 생성, 있으면 컬럼 맞춰줌.
#   학습/개발용으로 편리. 실무 운영에선 validate 또는 none + 마이그레이션 도구(Flyway) 권장.
spring.jpa.hibernate.ddl-auto=update
# 실행되는 SQL을 콘솔에 보여줌 (공부할 때 어떤 쿼리가 나가는지 확인용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL 방언 명시 (보통 자동 감지되지만 명확히)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== 웹 서버 =====
# Python FastAPI가 8000을 썼으니 똑같이 8000으로 맞춤 (대시보드 HTML 수정 불필요)
server.port=8000
spring.jackson.property-naming-strategy=SNAKE_CASE
